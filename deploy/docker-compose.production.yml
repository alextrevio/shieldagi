version: '3.8'

# ShieldAGI 2.0 — Production Docker Compose Stack

services:
  # ═══════════════════════════════════════════════
  # OPENFANG RUNTIME
  # Agent orchestration engine
  # ═══════════════════════════════════════════════
  openfang:
    image: ghcr.io/shieldagi/openfang:latest
    container_name: shieldagi-openfang
    restart: unless-stopped
    ports:
      - "127.0.0.1:4200:4200"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
      - OPENFANG_PORT=4200
      - OPENFANG_DATA_DIR=/data
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    volumes:
      - openfang-data:/data
      - /opt/shieldagi/agents:/app/agents:ro
      - /opt/shieldagi/hands:/app/hands:ro
      - /opt/shieldagi/tools:/app/tools:ro
      - /opt/shieldagi/playbooks:/app/playbooks:ro
      - /opt/shieldagi/chain-walls:/app/chain-walls:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - shieldagi
      - sandbox
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════
  # POSTGRESQL
  # Knowledge store, reports, incident logs
  # ═══════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: shieldagi-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - shieldagi
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════
  # REDIS
  # Rate limiting, caching, job queues
  # ═══════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: shieldagi-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis-data:/data
    networks:
      - shieldagi
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════
  # GRAFANA
  # Monitoring dashboards
  # ═══════════════════════════════════════════════
  grafana:
    image: grafana/grafana:11.0-ubuntu
    container_name: shieldagi-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_SERVER_ROOT_URL=https://${DOMAIN:-localhost}/grafana
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shieldagi
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

networks:
  shieldagi:
    driver: bridge
  sandbox:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  openfang-data:
  postgres-data:
  redis-data:
  grafana-data:
